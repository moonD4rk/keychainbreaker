# See https://github.com/crate-ci/typos/blob/master/docs/reference.md to configure typos
[default.extend-words]
moond4rk = "moond4rk"
Decrypter = "Decrypter"
# 3DES-EDE (Encrypt-Decrypt-Encrypt) is the correct cryptographic term
EDE = "EDE"
# "alis" is an Apple CSSM attribute name for Alias
alis = "alis"
issu = "issu"
Iz = "Iz"

[files]
extend-exclude = ["go.mod", "go.sum"]
